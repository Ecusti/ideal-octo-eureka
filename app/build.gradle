plugins {
    id 'com.android.application'
}

android {
    namespace 'com.trajets.galsync'
    compileSdk 36

    defaultConfig {
        applicationId "com.trajets.galsync2"
        minSdk 26
        targetSdk 35
        versionCode 6
        versionName "1.0.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'com.google.android.material:material:1.13.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.browser:browser:1.10.0'

    implementation('com.microsoft.identity.client:msal:8.2.3') {
        exclude group: 'com.microsoft.device.display', module: 'display-mask'
    }
    implementation('com.microsoft.identity:common:24.0.1') {
        exclude group: 'com.microsoft.device.display', module: 'display-mask'
    }

    implementation 'com.microsoft.graph:microsoft-graph:6.62.0'
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'
    implementation 'androidx.core:core-ktx:1.18.0'
    implementation 'androidx.lifecycle:lifecycle-runtime:2.10.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel:2.10.0'
    implementation 'androidx.work:work-runtime:2.11.2'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'

    // Explicitly add Guava to resolve ListenableFuture error
    implementation 'com.google.guava:guava:33.5.0-android'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.7.0'
}

configurations.configureEach {
    exclude group: 'com.microsoft.device.display', module: 'display-mask'
}
